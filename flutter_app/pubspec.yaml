name: opencare
description: "OpenCare — FOSS Hospital Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # UI/UX
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # Media
  image_picker: ^1.1.2
  record: ^6.0.0
  audioplayers: ^6.1.0
  flutter_tts: ^4.0.2
  path_provider: ^2.1.5

  # Network
  http: ^1.2.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.1
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
